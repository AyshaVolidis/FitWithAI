name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build and Deploy to Cloudflare Workers
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          VITE_SUPABASE_URL: https://nqeqozweomzfbsexypep.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: sb_publishable_o62UndredP0L3Q6s6bzsmQ_nTvpYAHm
          VITE_SUPABASE_PROJECT_ID: nqeqozweomzfbsexypep
          SUPABASE_URL: https://nqeqozweomzfbsexypep.supabase.co
          SUPABASE_PUBLISHABLE_KEY: sb_publishable_o62UndredP0L3Q6s6bzsmQ_nTvpYAHm
